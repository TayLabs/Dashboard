name: ${CONTAINER_PREFIX:-taylab}-services

services:
  auth-postgres:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: tayLabAuth
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    # ports:
    #   - '5919:5432'
    volumes:
      - auth-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tayLabAuth -d auth"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["development", "production", "test"]
    networks:
      - database

  auth-redis:
    image: redis:latest
    restart: unless-stopped
    # ports:
    #   - '6919:6379'
    volumes:
      - auth-redis:/data
    environment:
      - REDIS_PASSWORD=${AUTH_REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["development", "production", "test"]
    networks:
      - database

  keys-postgres:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: keys
      POSTGRES_USER: tayLabKeys
      POSTGRES_PASSWORD: ${KEYS_DATABASE_PASSWORD}
    # ports:
    #   - '3919:5432'
    volumes:
      - keys-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tayLabKeys -d keys"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["development", "production", "test"]
    networks:
      - database

  taylab-keys:
    image: taylorkelley/taylabs-keys:latest
    restart: unless-stopped
    # ports:
    #   - '2919:7212'
    environment:
      DATABASE_URL: postgres://tayLabKeys:${KEYS_DATABASE_PASSWORD}@keys-postgres:5432/keys
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      API_KEY_TTL: 120d
    depends_on:
      keys-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -I http://localhost:7212"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["development", "production", "test"]
    networks:
      - backend
      - frontend
      - database

  taylab-mail:
    image: taylorkelley/taylabs-mail:latest
    restart: unless-stopped
    environment:
      KEY_SERVICE_BASE_URL: http://taylab-keys:2919
      MAILTRAP_API_KEY: ${MAILTRAP_API_KEY} # Set with export MAILTRAP_API_KEY=value (setx for powershell)
    # ports:
    #   - '4919:7414'
    depends_on:
      taylab-keys:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -I http://localhost:7414"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["development", "production", "test"]
    networks:
      - backend
      - database

  taylab-auth:
    image: taylorkelley/taylabs-auth:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://tayLabAuth:${AUTH_DB_PASSWORD}@auth-postgres:5432/auth
      REDIS_URI: redis://:${AUTH_REDIS_PASSWORD}@auth-redis:6379
      MAIL_API: taylab-mail:7212
      MAIL_API_KEY: ${MAIL_API_KEY} # Set with export MAIL_API_KEY=value (setx for powershell)
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      TOTP_ENCRYPT_KEY: ${TOTP_ENCRYPT_KEY}
      RESET_TOKEN_HASH_KEY: ${RESET_TOKEN_HASH_KEY}
      EMAIL_VERIFICATION_SECRET: ${EMAIL_VERIFICATION_SECRET}
      FRONTEND_URL: http://localhost:9919 # Publicly viewable url for use in email links
      HOST_DOMAIN: localhost # root public url used for setting cookie's domain attribute (i.e. *.domain.com)
    # ports:
    #   - "7313:7313"
    depends_on:
      auth-postgres:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
      taylab-mail:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -I http://localhost:7313"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["development", "production", "test"]
    networks:
      - backend
      - frontend
      - database

  taylab-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    # image: taylorkelley/taylabs-dashboard # Run pnpm docker:build beforehand, then run docker compose --profile production up -d
    restart: unless-stopped
    environment:
      SERVICE_NAME: dashboard
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      AUTH_API_URI: taylab-auth:7313
      HOST_URI: localhost:8919 # Public facing url for site to redirect too
    ports:
      - "8919:7919"
    depends_on:
      taylab-auth:
        condition: service_healthy
    profiles: ["production", "test"]
    networks:
      - frontend
      - backend

volumes:
  auth-postgres:
  auth-redis:
  keys-postgres:

networks:
  frontend:
    name: taylab_frontend_net
    driver: bridge
    driver_opts:
      com.docker.network.bridge.host_binding_ipv4: "127.0.0.1"
  backend:
    name: taylab_backend_net
    driver: bridge
  database:
    name: taylab_database_net
    driver: bridge
    # internal: true
